# Sparsity sweep at fixed d=50, p=25 (figure J). Increasing row sparsity s = s_A + s_B.
# Run: python src/main.py --sweep sparsity --n-workers 20   ->  results/sparsity/s{s}/
base: synthetic
vary:
  - {name: s2, d: 50, p: 25, s_A: 1, s_B: 1}
  - {name: s3, d: 50, p: 25, s_A: 2, s_B: 1}
  - {name: s4, d: 50, p: 25, s_A: 3, s_B: 1}
  - {name: s5, d: 50, p: 25, s_A: 4, s_B: 1}
  - {name: s6, d: 50, p: 25, s_A: 5, s_B: 1}
  - {name: s7, d: 50, p: 25, s_A: 6, s_B: 1}
  - {name: s8, d: 50, p: 25, s_A: 7, s_B: 1}
  - {name: s9, d: 50, p: 25, s_A: 8, s_B: 1}
  - {name: s10, d: 50, p: 25, s_A: 9, s_B: 1}
