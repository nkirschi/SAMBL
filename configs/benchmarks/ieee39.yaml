name: ieee39

system:
  family: ieee39
  d: 78
  p: 9
  s_A: 7
  s_B: 1

simulation:
  T: 1.0
  dt: 0.02
  sigma: 0.3
  x0_std: 1.0

cost:
  q_scale: 1.0
  r_scale: 1.0

training:
  max_episodes: 1000
  n_seeds: 20
  m_explore: 1

agents:
  - oracle
  - dense_greedy
  - dense_excited
  - sparse_greedy
  - sparse_excited

estimation:
  lambda_lasso: null
  c_lambda: 0.02
  delta: 0.05
  mu_ridge: 1.0e-6
  lasso_max_iter: 10000
  lasso_tol: 1.0e-4
  n_fit_threads: 2

excitation:
  sigma_u: 0.05
