# d=100 benchmark: very high dimension (s_A=2, s_B=1, total=3)
name: d100

system:
  d: 100
  p: 25
  s_A: 2
  s_B: 1
  a_min: 0.1
  a_max: 1.9
  b_min: 0.1
  b_max: 1.9
  max_instability: 1.0

simulation:
  T: 1.0
  dt: 0.025
  sigma: 0.5
  x0_std: 0.0

cost:
  q_scale: 1.0
  r_scale: 1.0

training:
  max_episodes: 200
  n_seeds: 50

agents:
  - oracle
  - dense_greedy
  - dense_excited
  - sparse_greedy
  - sparse_excited

estimation:
  lambda_lasso: 0.08
  delta: 0.05
  mu_ridge: 0.0
  lasso_max_iter: 5000
  lasso_tol: 1.0e-4

excitation:
  sigma_u: 0.05
