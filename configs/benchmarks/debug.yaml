# quick debugging run
name: debug

system:
  d: 10
  p: 3
  s_A: 2
  s_B: 1
  a_min: 0.1
  a_max: 1.9
  b_min: 0.1
  b_max: 1.9

simulation:
  T: 1.0
  dt: 0.025
  sigma: 0.25
  x0_std: 0.0

cost:
  q_scale: 1.0
  r_scale: 1.0

training:
  max_episodes: 20
  n_seeds: 10
  m_explore: 1

agents:
  - oracle
  - dense_greedy
  - dense_excited
  - sparse_greedy
  - sparse_excited

estimation:
  lambda_lasso: null
  c_lambda: 0.02
  delta: 0.05
  mu_ridge: 1.0e-6
  lasso_max_iter: 10000
  lasso_tol: 1.0e-4

excitation:
  sigma_u: 0.05
