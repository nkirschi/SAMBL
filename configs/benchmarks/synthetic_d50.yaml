# d=50 benchmark: high dimension (s_A=2, s_B=1, total=3)
name: synthetic_d50

system:
  family: synthetic
  d: 50
  p: 13
  s_A: 2
  s_B: 1
  a_min: 0.1
  a_max: 1.9
  b_min: 0.1
  b_max: 1.9

simulation:
  T: 1.0
  dt: 0.02
  sigma: 0.3
  x0_std: 0.0

cost:
  q_scale: 1.0
  r_scale: 1.0

training:
  max_episodes: 200
  n_seeds: 25
  m_explore: 0

agents:
  - oracle
  - dense_greedy
  - dense_excited
  - sparse_greedy
  - sparse_excited

estimation:
  lambda_lasso: null
  c_lambda: 0.02
  delta: 0.05
  mu_ridge: 1.0e-6
  lasso_max_iter: 10000
  lasso_tol: 1.0e-4

excitation:
  sigma_u: 0.05
