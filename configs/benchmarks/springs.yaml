# Spring-mass chain benchmark: d=20 -> n=10 masses, p=5 actuators (half), s=3 (banded)
name: springs

system:
  family: spring_chain
  d: 20          # = 2n
  p: 5           # actuators = n/2 (p/d = 1/4)
  s_A: 3         # max velocity-row A-sparsity (nearest-neighbour band)
  s_B: 1
  k_min: 0.5
  k_max: 2.0
  m_min: 0.5
  m_max: 1.5

simulation:
  T: 1.0
  dt: 0.02
  sigma: 0.3
  x0_std: 1.0

cost:
  q_scale: 1.0
  r_scale: 1.0

training:
  max_episodes: 200
  n_seeds: 25
  m_explore: 0

agents:
  - oracle
  - dense_greedy
  - dense_excited
  - sparse_greedy
  - sparse_excited

estimation:
  lambda_lasso: null
  c_lambda: 0.02
  delta: 0.05
  mu_ridge: 1.0e-6
  lasso_max_iter: 10000
  lasso_tol: 1.0e-4

excitation:
  sigma_u: 0.05
