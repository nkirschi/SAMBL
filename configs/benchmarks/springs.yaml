name: springs

system:
  family: spring_chain
  d: 20
  p: 5
  s_A: 3
  s_B: 1
  k_min: 0.5
  k_max: 2.0
  m_min: 0.5
  m_max: 1.5

simulation:
  T: 1.0
  dt: 0.02
  sigma: 0.3
  x0_std: 1.0

cost:
  q_scale: 1.0
  r_scale: 1.0

training:
  max_episodes: 1000
  n_seeds: 20
  m_explore: 1

agents:
  - oracle
  - dense_greedy
  - dense_excited
  - sparse_greedy
  - sparse_excited

estimation:
  lambda_lasso: null
  c_lambda: 0.02
  delta: 0.05
  mu_ridge: 1.0e-6
  lasso_max_iter: 10000
  lasso_tol: 1.0e-4
  n_fit_threads: 4

excitation:
  sigma_u: 0.05
